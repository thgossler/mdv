name: release

# Builds the self-contained `mdv` executable on each native platform (the Wails
# GUI helper needs the platform's native webview toolchain, so we build per-OS
# rather than cross-compiling) and attaches the artifacts to the GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-universal
          - os: windows-latest
            target: windows-amd64
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Linux WebKitGTK (build-time only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/build.sh "${GITHUB_REF_NAME}"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/build.ps1 -Version "$env:GITHUB_REF_NAME"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/mdv.exe "dist/mdv-${{ matrix.target }}.exe"
          else
            tar -C build -czf "dist/mdv-${{ matrix.target }}.tar.gz" mdv
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mdv-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
