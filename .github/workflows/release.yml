name: release

# Builds the self-contained `mdv` executable on each native platform (the Wails
# GUI helper needs the platform's native webview toolchain, so we build per-OS
# rather than cross-compiling), code-signs/notarizes the macOS binary and
# signs the Windows binary with Azure Artifact Signing, then attaches the
# artifacts to the GitHub Release.
#
# Signing is automatic but optional: each step is skipped when its secrets are
# absent, so the workflow still produces (unsigned) binaries for forks.
#
# Required repository secrets for signing:
#   macOS    — APPLE_CERTIFICATE_P12_BASE64, APPLE_CERTIFICATE_PASSWORD,
#              APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD
#   Windows  — AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#              (Azure Artifact Signing via OpenID Connect / federated credential)
# Required repository variables for Windows signing (non-secret config):
#   AZURE_CODESIGNING_ENDPOINT  e.g. https://weu.codesigning.azure.net/
#   AZURE_CODESIGNING_ACCOUNT   the Artifact Signing account name
#   AZURE_CODESIGNING_PROFILE   the certificate profile name

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # required for Azure Artifact Signing OIDC login

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-universal
          - os: windows-latest
            target: windows-amd64
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
      HAS_WINDOWS_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Linux WebKitGTK (build-time only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install Wails v3 CLI (Windows only)
        # scripts/build.ps1 calls wails3 directly; scripts/build.sh tolerates a
        # missing CLI (generation is best-effort). Limit installation to Windows
        # so Linux runners do not compile Wails CLI cgo dependencies.
        if: runner.os == 'Windows'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.103

      # --- macOS signing setup -------------------------------------------------
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT"

      # --- Build (signs embedded helper + launcher when certs are present) -----
      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          MDV_MACOS_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: scripts/build.sh "${GITHUB_REF_NAME}"

      # --- Windows build + Azure Artifact Signing ------------------------------
      # The GUI helper is signed before it is embedded, so the build is split:
      # build helper -> sign helper -> build launcher -> sign launcher.
      - name: Build GUI helper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/build.ps1 -Version "$env:GITHUB_REF_NAME" -Stage helper

      - name: Azure login for Artifact Signing (Windows)
        if: runner.os == 'Windows' && env.HAS_WINDOWS_SIGNING == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign GUI helper (Windows)
        if: runner.os == 'Windows' && env.HAS_WINDOWS_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGNING_PROFILE }}
          files: ${{ github.workspace }}\build\mdv-gui.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build launcher (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/build.ps1 -Version "$env:GITHUB_REF_NAME" -Stage launcher

      - name: Sign launcher (Windows)
        if: runner.os == 'Windows' && env.HAS_WINDOWS_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGNING_PROFILE }}
          files: ${{ github.workspace }}\build\mdv.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # --- macOS notarization --------------------------------------------------
      - name: Notarize (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: scripts/notarize-macos.sh build/mdv

      # Every platform ships as an archive whose name carries the platform
      # (e.g. mdv-windows-amd64.zip); the executable inside is always just
      # "mdv" / "mdv.exe". Windows uses zip, everything else tar.gz.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/mdv.exe -DestinationPath "dist/mdv-${{ matrix.target }}.zip" -Force

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C build -czf "dist/mdv-${{ matrix.target }}.tar.gz" mdv

      - uses: actions/upload-artifact@v4
        with:
          name: mdv-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
