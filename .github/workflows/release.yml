name: release

# Builds the self-contained `mdv` executable on each native platform (the Wails
# GUI helper needs the platform's native webview toolchain, so we build per-OS
# rather than cross-compiling), code-signs/notarizes the macOS binary and
# AuthentiCode-signs the Windows binary, then attaches the artifacts to the
# GitHub Release.
#
# Signing is automatic but optional: each step is skipped when its secrets are
# absent, so the workflow still produces (unsigned) binaries for forks.
#
# Required repository secrets for signing:
#   macOS  — APPLE_CERTIFICATE_P12_BASE64, APPLE_CERTIFICATE_PASSWORD,
#            APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD
#   Windows— WINDOWS_CERTIFICATE_PFX_BASE64, WINDOWS_CERTIFICATE_PASSWORD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-universal
          - os: windows-latest
            target: windows-amd64
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Linux WebKitGTK (build-time only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      # --- macOS signing setup -------------------------------------------------
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT"

      # --- Windows signing setup -----------------------------------------------
      - name: Decode Windows code-signing certificate
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERT == 'true'
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_B64))
          "MDV_WINDOWS_SIGN_PFX=$pfx" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # --- Build (signs embedded helper + launcher when certs are present) -----
      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          MDV_MACOS_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: scripts/build.sh "${GITHUB_REF_NAME}"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MDV_WINDOWS_SIGN_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: pwsh scripts/build.ps1 -Version "$env:GITHUB_REF_NAME"

      # --- macOS notarization --------------------------------------------------
      - name: Notarize (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: scripts/notarize-macos.sh build/mdv

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/mdv.exe "dist/mdv-${{ matrix.target }}.exe"
          else
            tar -C build -czf "dist/mdv-${{ matrix.target }}.tar.gz" mdv
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mdv-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
