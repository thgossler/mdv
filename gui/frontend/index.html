<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: blob:; img-src 'self' data: blob: file: http: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-src 'none';"
    />
    <title>mdv</title>
  </head>
  <body class="theme-system">
    <div id="app" class="layout-pending" data-file-drop-target>
      <!-- Thin no-drag strips along the top edge and top corners keep the JS
           `--wails-draggable` toolbar from grabbing those few pixels, so the
           native window frame owns them for resizing. The primary fix lives in
           gui/main.go (InvisibleTitleBarHeight: 0); these are a belt-and-braces
           guard for the JS drag path. -->
      <div class="resize-edge resize-edge-top" aria-hidden="true"></div>
      <div class="resize-edge resize-edge-top-left" aria-hidden="true"></div>
      <div class="resize-edge resize-edge-top-right" aria-hidden="true"></div>
      <!-- Toolbar sits in the same row as the native window controls. -->
      <header id="toolbar" class="toolbar">
        <div class="toolbar-left">
          <button id="btn-back" class="tb-btn" title="Back (Cmd/Ctrl+Left)" disabled>‹</button>
          <div id="history-menu" class="history-menu hidden"></div>
          <button id="btn-history" class="tb-btn" title="History" aria-label="History" disabled><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3.14598 5.85423L7.64598 10.3542C7.84098 10.5492 8.15798 10.5492 8.35298 10.3542L12.853 5.85423C13.048 5.65923 13.048 5.34223 12.853 5.14723C12.658 4.95223 12.341 4.95223 12.146 5.14723L7.99998 9.29323L3.85398 5.14723C3.65898 4.95223 3.34198 4.95223 3.14698 5.14723C2.95198 5.34223 2.95098 5.65923 3.14598 5.85423Z"/></svg></button>
          <button id="btn-forward" class="tb-btn" title="Forward (Cmd/Ctrl+Right)" disabled>›</button>
          <div id="recent-menu" class="recent-menu hidden"></div>
          <button id="btn-recent" class="tb-btn" title="Recently opened files &amp; folders" disabled>◷</button>
          <button id="btn-reload" class="tb-btn" title="Reload document (Cmd/Ctrl+R)">⟳</button>
          <button id="btn-watch" class="tb-btn" title="Auto-reload active document when it changes on disk (off)">⊙</button>
          <button id="btn-open-external" class="tb-btn hidden" title="Open in the associated app">↗</button>
        </div>
        <div id="doc-title" class="doc-title"></div>
        <div class="toolbar-right">
          <button id="btn-pdf" class="tb-btn tb-btn-text" title="Export to PDF">PDF</button>
          <button id="btn-remote-img" class="tb-btn" title="Remote images are blocked. Click to load remote images for this session (reset on restart).">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11.5 7C9.015 7 7 9.015 7 11.5C7 13.985 9.015 16 11.5 16C13.985 16 16 13.985 16 11.5C16 9.015 13.985 7 11.5 7ZM13.854 11.854L11.854 13.854C11.806 13.902 11.751 13.938 11.692 13.963C11.634 13.987 11.57 14 11.504 14.001H11.498C11.431 14.001 11.368 13.987 11.31 13.963C11.252 13.939 11.197 13.903 11.15 13.857L11.147 13.854L9.147 11.854C8.952 11.659 8.952 11.342 9.147 11.147C9.342 10.952 9.659 10.952 9.854 11.147L11 12.294V9.001C11 8.725 11.224 8.501 11.5 8.501C11.776 8.501 12 8.725 12 9.001V12.294L13.146 11.147C13.341 10.952 13.658 10.952 13.853 11.147C14.048 11.342 14.048 11.659 13.853 11.854H13.854ZM4.25 12H6V13H4.25C2.455 13 1 11.545 1 9.75C1 8.029 2.338 6.62 4.03 6.507C4.273 4.53 5.958 3 8 3C9.862 3 11.411 4.278 11.857 6H10.811C10.397 4.838 9.303 4 8 4C6.343 4 5 5.343 5 7C5 7.276 4.776 7.5 4.5 7.5H4.25C3.007 7.5 2 8.507 2 9.75C2 10.993 3.007 12 4.25 12Z"/></svg>
          </button>
          <button id="btn-extended" class="tb-btn" title="Toggle extended Markdown syntax (math, sub/sup, highlight)">∑</button>
          <button id="btn-raw" class="tb-btn" title="View raw Markdown" aria-label="View raw Markdown"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.7 4.3a.75.75 0 0 1 0 1.06L3.06 8l2.64 2.64a.75.75 0 1 1-1.06 1.06L1.47 8.53a.75.75 0 0 1 0-1.06L4.64 4.3a.75.75 0 0 1 1.06 0Zm4.6 0a.75.75 0 0 1 1.06 0l3.17 3.17a.75.75 0 0 1 0 1.06l-3.17 3.17a.75.75 0 1 1-1.06-1.06L12.94 8l-2.64-2.64a.75.75 0 0 1 0-1.06Z"/></svg></button>
          <button id="btn-mono" class="tb-btn" title="Toggle monospace">M</button>
          <button id="btn-width" class="tb-btn" title="Toggle full width">↔</button>
          <button id="btn-theme" class="tb-btn" title="Toggle theme (Cmd/Ctrl+J)">◐</button>
          <button id="btn-sidebar" class="tb-btn" title="Toggle left panel (Cmd/Ctrl+B)" aria-label="Toggle left panel"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M12.5 1C13.881 1 15 2.119 15 3.5V12.5C15 13.881 13.881 15 12.5 15H3.5C2.119 15 1 13.881 1 12.5V3.5C1 2.119 2.119 1 3.5 1H12.5ZM12.5 14C13.328 14 14 13.328 14 12.5V3.5C14 2.672 13.328 2 12.5 2H7V14H12.5Z"/></svg></button>
          <button id="btn-toc" class="tb-btn" title="Toggle right panel" aria-label="Toggle right panel"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M12.5 1C13.881 1 15 2.119 15 3.5V12.5C15 13.881 13.881 15 12.5 15H3.5C2.119 15 1 13.881 1 12.5V3.5C1 2.119 2.119 1 3.5 1H12.5ZM9 14V2H3.5C2.672 2 2 2.672 2 3.5V12.5C2 13.328 2.672 14 3.5 14H9Z"/></svg></button>
        </div>
      </header>

      <div id="body" class="body">
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-head">
            <input id="nav-filter" class="nav-filter" type="text" placeholder="Filter documents…" />
            <button id="btn-content-search" class="tb-btn" title="Search document content (off)">⌕</button>
            <button id="btn-labels" class="tb-btn" title="Toggle filename/title (Cmd/Ctrl+T)">#</button>
          </div>
          <nav id="nav-list" class="nav-list" tabindex="-1"></nav>
          <div id="sidebar-foot" class="sidebar-foot">
            <div class="exclude-head">
              <label for="nav-exclude" class="exclude-label" title="Exclusion pattern in the style of .gitignore">Exclude</label>
              <label
                class="exclude-toggle"
                title="Enable/disable the exclusion filters"
              >
                <input id="exclude-enabled" type="checkbox" />
              </label>
            </div>
            <textarea
              id="nav-exclude"
              class="nav-exclude"
              rows="3"
              spellcheck="false"
              autocomplete="off"
              autocapitalize="off"
              placeholder="e.g. archive/&#10;*.draft.md"
              title="Exclusion pattern in the style of .gitignore"
            ></textarea>
          </div>
        </aside>

        <div
          id="sidebar-resizer"
          class="pane-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize navigation pane"
          title="Drag to resize (double-click to reset)"
        ></div>

        <div id="content-frame" class="content-frame">
          <main id="content-wrap" class="content-wrap" tabindex="-1">
            <div id="search-bar" class="search-bar hidden">
              <input id="search-input" type="text" placeholder="Find in document…" />
              <span id="search-count" class="search-count"></span>
              <button id="search-prev" class="tb-btn" title="Previous">↑</button>
              <button id="search-next" class="tb-btn" title="Next">↓</button>
              <button id="search-close" class="tb-btn" title="Close">✕</button>
            </div>
            <article id="content" class="markdown-body"></article>
          </main>
        </div>

        <div
          id="toc-resizer"
          class="pane-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize contents pane"
          title="Drag to resize (double-click to reset)"
        ></div>

        <aside id="toc" class="toc">
          <div class="panel-head">Contents</div>
          <nav id="toc-list" class="toc-list" tabindex="-1"></nav>
          <div id="backlinks-head" class="panel-head">Backlinks</div>
          <div id="backlinks-list" class="backlinks-list" tabindex="-1"></div>
        </aside>
      </div>

      <footer id="statusbar" class="statusbar">
        <span id="status-left" class="status-left"></span>
        <span id="status-mid" class="status-mid"></span>
        <span id="status-right" class="status-right"></span>
        <button id="btn-zoom-reset" class="status-btn" title="Reset zoom to 100%">Reset Zoom</button>
        <button id="btn-reset-layout" class="status-btn" title="Reset window size and panel widths to defaults">Reset Layout</button>
      </footer>

      <div id="context-menu" class="context-menu hidden"></div>

      <div id="external-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="external-modal-title">
        <div class="modal-box">
          <div id="external-modal-title" class="modal-title">Open external link?</div>
          <div class="modal-text">This will open the following destination in an external application:</div>
          <div id="external-modal-url" class="modal-url"></div>
          <label class="modal-remember">
            <input id="external-modal-remember" type="checkbox" />
            Allow external links for this session without asking
          </label>
          <div class="modal-actions">
            <button id="external-modal-cancel" class="modal-btn">Cancel</button>
            <button id="external-modal-open" class="modal-btn modal-btn-primary">Open</button>
          </div>
        </div>
      </div>

      <div id="about-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="about-modal-title">
        <div class="modal-box about-box">
          <img id="about-icon" class="about-icon" src="/appicon.png" alt="" />
          <div id="about-modal-title" class="about-name">mdv</div>
          <div id="about-version" class="about-version"></div>
          <div id="about-copyright" class="about-copyright"></div>
          <a id="about-repo" class="about-repo" href="#"></a>
          <div class="modal-actions about-actions">
            <button id="about-modal-close" class="modal-btn modal-btn-primary">Close</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
