<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: blob:; img-src 'self' data: blob: file: http: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-src 'none';"
    />
    <title>mdv</title>
  </head>
  <body class="theme-system">
    <div id="app" class="layout-pending" data-file-drop-target>
      <!-- Thin no-drag strips along the top edge and top corners keep the JS
           `--wails-draggable` toolbar from grabbing those few pixels, so the
           native window frame owns them for resizing. The primary fix lives in
           gui/main.go (InvisibleTitleBarHeight: 0); these are a belt-and-braces
           guard for the JS drag path. -->
      <div class="resize-edge resize-edge-top" aria-hidden="true"></div>
      <div class="resize-edge resize-edge-top-left" aria-hidden="true"></div>
      <div class="resize-edge resize-edge-top-right" aria-hidden="true"></div>
      <!-- Toolbar sits in the same row as the native window controls. -->
      <header id="toolbar" class="toolbar">
        <div class="toolbar-left">
          <button id="btn-back" class="tb-btn" title="Back (Cmd/Ctrl+Left)" disabled>‹</button>
          <button id="btn-forward" class="tb-btn" title="Forward (Cmd/Ctrl+Right)" disabled>›</button>
          <div id="history-menu" class="history-menu hidden"></div>
          <button id="btn-history" class="tb-btn" title="History" disabled>▾</button>
          <button id="btn-sidebar" class="tb-btn" title="Toggle sidebar (Cmd/Ctrl+B)">☰</button>
        </div>
        <div id="doc-title" class="doc-title"></div>
        <div class="toolbar-right">
          <button id="btn-remote-img" class="tb-btn" title="Remote images are blocked. Click to load remote images for this session (reset on restart).">▦</button>
          <button id="btn-extended" class="tb-btn" title="Toggle extended Markdown syntax (math, sub/sup, highlight)">∑</button>
          <button id="btn-mono" class="tb-btn" title="Toggle monospace">M</button>
          <button id="btn-width" class="tb-btn" title="Toggle full width">↔</button>
          <button id="btn-toc" class="tb-btn" title="Toggle table of contents">⊟</button>
          <button id="btn-theme" class="tb-btn" title="Toggle theme (Cmd/Ctrl+J)">◐</button>
        </div>
      </header>

      <div id="body" class="body">
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-head">
            <input id="nav-filter" class="nav-filter" type="text" placeholder="Filter documents…" />
            <button id="btn-content-search" class="tb-btn" title="Search document content (off)">⌕</button>
            <button id="btn-labels" class="tb-btn" title="Toggle filename/title (Cmd/Ctrl+T)">#</button>
          </div>
          <nav id="nav-list" class="nav-list" tabindex="-1"></nav>
          <div id="sidebar-foot" class="sidebar-foot">
            <div class="exclude-head">
              <label for="nav-exclude" class="exclude-label" title="Exclusion pattern in the style of .gitignore">Exclude</label>
              <label
                class="exclude-toggle"
                title="Enable/disable the exclusion filters"
              >
                <input id="exclude-enabled" type="checkbox" />
              </label>
            </div>
            <textarea
              id="nav-exclude"
              class="nav-exclude"
              rows="3"
              spellcheck="false"
              autocomplete="off"
              autocapitalize="off"
              placeholder="e.g. archive/&#10;*.draft.md"
              title="Exclusion pattern in the style of .gitignore"
            ></textarea>
          </div>
        </aside>

        <div
          id="sidebar-resizer"
          class="pane-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize navigation pane"
          title="Drag to resize (double-click to reset)"
        ></div>

        <div id="content-frame" class="content-frame">
          <main id="content-wrap" class="content-wrap" tabindex="-1">
            <div id="search-bar" class="search-bar hidden">
              <input id="search-input" type="text" placeholder="Find in document…" />
              <span id="search-count" class="search-count"></span>
              <button id="search-prev" class="tb-btn" title="Previous">↑</button>
              <button id="search-next" class="tb-btn" title="Next">↓</button>
              <button id="search-close" class="tb-btn" title="Close">✕</button>
            </div>
            <article id="content" class="markdown-body"></article>
          </main>
        </div>

        <div
          id="toc-resizer"
          class="pane-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize contents pane"
          title="Drag to resize (double-click to reset)"
        ></div>

        <aside id="toc" class="toc">
          <div class="panel-head">Contents</div>
          <nav id="toc-list" class="toc-list" tabindex="-1"></nav>
          <div id="backlinks-head" class="panel-head">Backlinks</div>
          <div id="backlinks-list" class="backlinks-list" tabindex="-1"></div>
        </aside>
      </div>

      <footer id="statusbar" class="statusbar">
        <span id="status-left" class="status-left"></span>
        <span id="status-mid" class="status-mid"></span>
        <span id="status-right" class="status-right"></span>
        <button id="btn-zoom-reset" class="status-btn" title="Reset zoom to 100%">Reset Zoom</button>
        <button id="btn-reset-layout" class="status-btn" title="Reset window size and panel widths to defaults">Reset Layout</button>
      </footer>

      <div id="context-menu" class="context-menu hidden"></div>

      <div id="external-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="external-modal-title">
        <div class="modal-box">
          <div id="external-modal-title" class="modal-title">Open external link?</div>
          <div class="modal-text">This will open the following destination in an external application:</div>
          <div id="external-modal-url" class="modal-url"></div>
          <label class="modal-remember">
            <input id="external-modal-remember" type="checkbox" />
            Allow external links for this session without asking
          </label>
          <div class="modal-actions">
            <button id="external-modal-cancel" class="modal-btn">Cancel</button>
            <button id="external-modal-open" class="modal-btn modal-btn-primary">Open</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
